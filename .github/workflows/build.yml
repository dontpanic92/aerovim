name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: aerovim_win_x64
          - os: macos-latest
            rid: osx-arm64
            artifact: aerovim_osx_arm64
          - os: macos-latest
            rid: osx-x64
            artifact: aerovim_osx_x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: aerovim_linux_x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      run: dotnet restore aerovim.sln

    - name: Publish
      run: dotnet publish AeroVim/AeroVim.csproj --configuration Release --runtime ${{ matrix.rid }} -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:DebugType=none

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: |
          AeroVim/bin/Release/net10.0/${{ matrix.rid }}/publish/
          !AeroVim/bin/Release/net10.0/${{ matrix.rid }}/publish/*.xml
