name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore NuGet packages
      run: dotnet restore dotnvim.sln

    - name: Publish
      run: dotnet publish Dotnvim/Dotnvim.csproj --configuration Release --runtime win-x64 -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:DebugType=none -p:GenerateDocumentationFile=false

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnvim_x64
        path: Dotnvim/bin/x64/Release/net10.0-windows/win-x64/publish/
