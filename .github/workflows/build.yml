name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: aerovim_win_x64
          - os: macos-latest
            rid: osx-arm64
            artifact: aerovim_osx_arm64
          - os: macos-latest
            rid: osx-x64
            artifact: aerovim_osx_x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: aerovim_linux_x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      run: dotnet restore aerovim.sln

    - name: Build
      run: dotnet build aerovim.sln --configuration Debug --no-restore --nologo

    - name: Run tests
      run: dotnet test Tests/Tests.csproj --configuration Debug --no-build --nologo

    - name: Read version prefix
      id: version
      shell: bash
      run: |
        PREFIX=$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' Directory.Build.props)
        VERSION="${PREFIX}-ci.${{ github.run_number }}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Publish
      run: dotnet publish AeroVim/AeroVim.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:DebugType=none -p:AeroVimVersion=${{ steps.version.outputs.version }}

    - name: Install vpk
      run: dotnet tool install -g vpk

    - name: Package with Velopack
      shell: bash
      run: |
        CHANNEL="${{ matrix.rid }}-ci"
        if [[ "${{ matrix.rid }}" == osx-* ]]; then
          PACK_DIR="AeroVim/bin/Release/net10.0/${{ matrix.rid }}/AeroVim.app/Contents/MacOS"
          MAIN_EXE="aerovim"
        elif [[ "${{ matrix.rid }}" == win-* ]]; then
          PACK_DIR="AeroVim/bin/Release/net10.0/${{ matrix.rid }}/publish"
          MAIN_EXE="aerovim.exe"
        else
          PACK_DIR="AeroVim/bin/Release/net10.0/${{ matrix.rid }}/publish"
          MAIN_EXE="aerovim"
        fi
        VPK_ARGS=(
          --packId AeroVim
          --packVersion "${{ steps.version.outputs.version }}"
          --packDir "$PACK_DIR"
          --mainExe "$MAIN_EXE"
          --channel "$CHANNEL"
          --outputDir staging
        )
        if [[ "${{ matrix.rid }}" == osx-* ]]; then
          BUNDLE_ROOT="AeroVim/bin/Release/net10.0/${{ matrix.rid }}/AeroVim.app"
          VPK_ARGS+=(--icon "${BUNDLE_ROOT}/Contents/Resources/aerovim.icns" --plist "${BUNDLE_ROOT}/Contents/Info.plist")
        fi
        vpk pack "${VPK_ARGS[@]}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: staging/
